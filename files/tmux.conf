# ─── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Terminal & Colors ────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# Required for Claude Code: allows OSC passthrough (notifications, image rendering)
set -g allow-passthrough on

# ─── Extended Keys (CSI u) ────────────────────────────────────────────────────
# Lets tmux distinguish Shift+Enter from Enter (needed for Claude Code newlines)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ─── General ──────────────────────────────────────────────────────────────────
set -g history-limit 50000
set -g mouse on
set -g escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
setw -g automatic-rename

# ─── Status Bar ───────────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[fg=colour46,bold][#S] #[fg=colour250]"
set -g status-right "#[fg=colour33]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=colour250]| #(env TZ=America/Chicago date +'%%m/%%d %%H:%%M CT') | #(env TZ=UTC date +'%%H:%%M UTC')"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "fg=colour255,bold,bg=colour24"

# ─── Window & Pane Management ─────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Copy Mode ────────────────────────────────────────────────────────────────
set -g mode-style "bg=colour24,fg=colour255"
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Shortcuts ────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
bind C command-prompt -p "Window name:" "new-window -n '%1' -c '#{pane_current_path}'"
bind S choose-session

# ─── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

run '~/.tmux/plugins/tpm/tpm'
